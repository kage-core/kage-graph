name: Rebuild Indexes

on:
  push:
    branches: [master]
    paths:
      - 'domains/**/nodes/*.md'

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    name: Atomic index rebuild + catalog update

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Rebuild domain indexes
        run: |
          python3 - << 'PYEOF'
          import json, os, re, glob
          from datetime import datetime, timezone

          today = datetime.now(timezone.utc)
          today_str = today.strftime('%Y-%m-%dT%H:%M:%SZ')
          today_date = today.strftime('%Y-%m-%d')

          SUMMARY_HEADERS = re.compile(r'^## (Symptom|Problem|Decision|When to Use)\s*$')

          def parse_frontmatter(content):
              """Parse YAML-like frontmatter between --- delimiters."""
              if not content.startswith('---'):
                  return {}, content
              end = content.find('\n---', 3)
              if end == -1:
                  return {}, content
              fm_text = content[3:end]
              body = content[end+4:]
              fm = {}
              in_tags = False
              tags_list = []
              for line in fm_text.split('\n'):
                  if in_tags:
                      stripped = line.strip()
                      if stripped.startswith(']'):
                          in_tags = False
                          fm['tags'] = tags_list
                      elif stripped.startswith('-'):
                          tags_list.append(stripped.lstrip('- ').strip().strip('"\''))
                      elif '[' not in stripped and stripped:
                          in_tags = False
                          fm['tags'] = tags_list
                      continue
                  if ':' not in line:
                      continue
                  key, _, val = line.partition(':')
                  key = key.strip()
                  val = val.strip().strip('"')
                  if key == 'tags':
                      if '[' in val and ']' in val:
                          inner = val.strip('[]')
                          tags_list = [t.strip().strip('"\'') for t in inner.split(',') if t.strip()]
                          fm['tags'] = tags_list
                      elif '[' in val:
                          in_tags = True
                          tags_list = []
                          inner = val.lstrip('[').strip()
                          if inner and inner != ']':
                              for t in inner.split(','):
                                  t = t.strip().strip('"\'')
                                  if t and not t.startswith(']'):
                                      tags_list.append(t)
                  elif key in ('score', 'uses', 'ttl_days'):
                      try:
                          fm[key] = int(val)
                      except ValueError:
                          fm[key] = val
                  elif key == 'fresh':
                      fm[key] = val.lower() == 'true'
                  else:
                      fm[key] = val
              return fm, body

          def extract_summary(body):
              """Return first non-empty line after a recognised section header."""
              found = False
              for line in body.split('\n'):
                  if SUMMARY_HEADERS.match(line):
                      found = True
                      continue
                  if found:
                      if line.startswith('## '):
                          break
                      stripped = line.strip()
                      if stripped:
                          # Strip markdown inline code backticks for cleaner summary
                          return re.sub(r'`([^`]+)`', r'\1', stripped)
              return ''

          def is_fresh(fm):
              fresh = fm.get('fresh', True)
              if not fresh:
                  return False
              updated = fm.get('updated', '')
              ttl = fm.get('ttl_days', 365)
              if not updated:
                  return True
              try:
                  updated_dt = datetime.strptime(updated, '%Y-%m-%d').replace(tzinfo=timezone.utc)
                  days_old = (today - updated_dt).days
                  return days_old <= ttl
              except Exception:
                  return True

          for domain_path in sorted(glob.glob('domains/*/')):
              domain = os.path.basename(domain_path.rstrip('/'))
              nodes_dir = os.path.join(domain_path, 'nodes')
              if not os.path.isdir(nodes_dir):
                  continue

              node_files = sorted(glob.glob(os.path.join(nodes_dir, '*.md')))
              if not node_files:
                  continue

              print(f'Rebuilding index for domain: {domain} ({len(node_files)} nodes)')

              nodes = []
              fresh_count = 0

              for node_file in node_files:
                  slug = os.path.basename(node_file)[:-3]
                  content = open(node_file, encoding='utf-8').read()
                  fm, body = parse_frontmatter(content)

                  node_fresh = is_fresh(fm)
                  if node_fresh:
                      fresh_count += 1

                  summary = extract_summary(body)

                  nodes.append({
                      'id': slug,
                      'type': fm.get('type', ''),
                      'title': fm.get('title', ''),
                      'severity': fm.get('severity', ''),
                      'score': fm.get('score', 50),
                      'uses': fm.get('uses', 0),
                      'tags': fm.get('tags', []),
                      'added': fm.get('added', ''),
                      'updated': fm.get('updated', ''),
                      'fresh': node_fresh,
                      'ttl_days': fm.get('ttl_days', 365),
                      'summary': summary,
                  })

              index = {
                  'domain': domain,
                  'updated': today_str,
                  'node_count': len(nodes),
                  'fresh_node_count': fresh_count,
                  'nodes': nodes,
              }

              out_path = os.path.join(domain_path, 'index.json')
              with open(out_path, 'w', encoding='utf-8') as f:
                  json.dump(index, f, indent=2, ensure_ascii=False)
              print(f'  Written: {out_path}')

          PYEOF

      - name: Rebuild catalog.json
        run: |
          set -e
          TODAY=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          TOTAL_NODES=0
          DOMAINS_JSON=""

          for DOMAIN_DIR in domains/*/; do
            DOMAIN=$(basename "$DOMAIN_DIR")
            INDEX="${DOMAIN_DIR}index.json"

            if [ ! -f "$INDEX" ]; then
              NODE_COUNT=0
              FRESH_COUNT=0
            else
              NODE_COUNT=$(python3 -c "import json,sys; d=json.load(open('$INDEX')); print(d.get('node_count',0))")
              FRESH_COUNT=$(python3 -c "import json,sys; d=json.load(open('$INDEX')); print(d.get('fresh_node_count',0))")
            fi

            TOTAL_NODES=$((TOTAL_NODES + NODE_COUNT))

            DOMAINS_JSON="${DOMAINS_JSON}    \"${DOMAIN}\": { \"nodes\": ${NODE_COUNT}, \"fresh_nodes\": ${FRESH_COUNT} },
          "
          done

          # Collect hot_nodes: top 5 by score across all domains
          HOT_NODES=$(python3 - << 'PYEOF'
          import json, os, glob

          all_nodes = []
          for index_path in glob.glob("domains/*/index.json"):
              try:
                  with open(index_path) as f:
                      data = json.load(f)
                  domain = data.get("domain", "")
                  for node in data.get("nodes", []):
                      all_nodes.append({
                          "id": f"{domain}/{node['id']}",
                          "score": node.get("score", 0),
                          "uses": node.get("uses", 0)
                      })
              except:
                  pass

          all_nodes.sort(key=lambda n: (n["score"], n["uses"]), reverse=True)
          top5 = [n["id"] for n in all_nodes[:5]]
          print(json.dumps(top5))
          PYEOF
          )

          python3 - << PYEOF
          import json, os

          # Read existing catalog for fields we don't recompute
          try:
              with open("catalog.json") as f:
                  existing = json.load(f)
          except:
              existing = {}

          # Build domains block
          domains = {}
          for d in os.listdir("domains"):
              idx_path = f"domains/{d}/index.json"
              if not os.path.isfile(idx_path):
                  continue
              with open(idx_path) as f:
                  data = json.load(f)
              node_count = data.get("node_count", 0)
              fresh_count = data.get("fresh_node_count", 0)
              # Collect type breakdown and top tags
              type_counts = {}
              tags_freq = {}
              for node in data.get("nodes", []):
                  t = node.get("type", "unknown")
                  type_counts[t] = type_counts.get(t, 0) + 1
                  for tag in node.get("tags", []):
                      tags_freq[tag] = tags_freq.get(tag, 0) + 1
              top_tags = sorted(tags_freq, key=lambda x: -tags_freq[x])[:6]
              domains[d] = {
                  "nodes": node_count,
                  "fresh_nodes": fresh_count,
                  "top_tags": top_tags,
                  "node_types": {t: type_counts.get(t, 0) for t in ["gotcha","pattern","config","decision","reference"]}
              }

          # Hot nodes: top 5 by score
          all_nodes = []
          for d, data_d in domains.items():
              idx_path = f"domains/{d}/index.json"
              if not os.path.isfile(idx_path): continue
              with open(idx_path) as f:
                  idx = json.load(f)
              for node in idx.get("nodes", []):
                  all_nodes.append({"id": f"{d}/{node['id']}", "score": node.get("score",0)})
          all_nodes.sort(key=lambda x: -x["score"])
          hot_nodes = [n["id"] for n in all_nodes[:5]]

          total = sum(d["nodes"] for d in domains.values())

          catalog = {
              "version": "1.0.0",
              "schema_version": "2.0",
              "updated": "${TODAY}",
              "domains": domains,
              "hot_nodes": hot_nodes,
              "total_nodes": total,
              "total_uses_30d": existing.get("total_uses_30d", 0),
              "contributors": existing.get("contributors", 1)
          }

          with open("catalog.json", "w") as f:
              json.dump(catalog, f, indent=2)

          print(f"catalog.json updated: {total} total nodes across {len(domains)} domains")
          PYEOF

      - name: Rebuild tag indexes
        run: |
          set -e
          mkdir -p tags

          python3 - << 'PYEOF'
          import json, os, glob

          tag_map = {}  # tag -> list of {id, domain, score}

          for node_file in glob.glob("domains/*/nodes/*.md"):
              parts = node_file.split("/")
              domain = parts[1]
              slug = parts[3].replace(".md", "")
              node_id = f"{domain}/{slug}"

              # Parse frontmatter
              content = open(node_file).read()
              fm_end = content.find("---", 3)
              if fm_end == -1:
                  continue
              fm = content[3:fm_end]

              score = 50
              tags = []
              node_type = ""
              in_tags = False

              for line in fm.split("\n"):
                  line = line.strip()
                  if line.startswith("score:"):
                      try:
                          score = int(line.split(":")[1].strip())
                      except:
                          pass
                  if line.startswith("type:"):
                      node_type = line.split(":")[1].strip().strip('"')
                  if line.startswith("tags:"):
                      if "[" in line:
                          tags = [t.strip().strip('"').strip("'") for t in line.split("[")[1].rstrip("]").split(",") if t.strip()]
                          in_tags = False
                      else:
                          in_tags = True
                  elif in_tags:
                      if line.startswith("-"):
                          tags.append(line.lstrip("- ").strip('"').strip("'"))
                      elif line.startswith("]") or (line and not line.startswith(" ") and not line.startswith("-")):
                          in_tags = False

              for tag in tags:
                  if tag not in tag_map:
                      tag_map[tag] = []
                  tag_map[tag].append({
                      "id": node_id,
                      "domain": domain,
                      "type": node_type,
                      "score": score
                  })

          for tag, nodes in tag_map.items():
              nodes.sort(key=lambda x: -x["score"])
              tag_file = f"tags/{tag}.json"
              with open(tag_file, "w") as f:
                  json.dump({
                      "tag": tag,
                      "node_count": len(nodes),
                      "nodes": nodes
                  }, f, indent=2)

          print(f"Rebuilt {len(tag_map)} tag index files")
          PYEOF

      - name: Commit updated indexes
        run: |
          git config user.name "kage-bot"
          git config user.email "bot@kage-memory.dev"

          git add domains/*/index.json catalog.json tags/*.json signals/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No index changes to commit."
          else
            git commit -m "chore: rebuild indexes [skip ci]

          Auto-generated by rebuild-indexes workflow on push to master."
            git push
          fi
